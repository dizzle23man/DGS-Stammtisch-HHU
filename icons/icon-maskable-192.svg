<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- Vollflächiger Hintergrund (kein Radius – maskable füllt alles) -->
  <rect width="192" height="192" fill="url(#bg)"/>
  <!-- Emoji in Safe Zone: mindestens 10% Abstand = 19px pro Seite -->
  <!-- Emoji zentriert mit Padding, kleiner als bei "any" -->
  <text x="96" y="108" font-size="68" text-anchor="middle"
        font-family="Segoe UI Emoji, Apple Color Emoji, sans-serif">👋</text>
  <text x="96" y="145" font-size="16" font-weight="bold" text-anchor="middle"
        font-family="Nunito, Arial, sans-serif" fill="#bfdbfe" letter-spacing="1">DGS HH</text>
</svg>
