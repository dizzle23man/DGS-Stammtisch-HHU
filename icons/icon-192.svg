<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:0.2"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="192" height="192" rx="40" fill="url(#bg)"/>

  <!-- Subtle ring decoration -->
  <circle cx="96" cy="96" r="75" fill="none" stroke="url(#ring)" stroke-width="2"/>

  <!-- Hand / wave emoji rendered as text -->
  <text x="96" y="115" font-size="80" text-anchor="middle" font-family="Segoe UI Emoji, Apple Color Emoji, sans-serif">👋</text>

  <!-- Bottom label -->
  <text x="96" y="168" font-size="18" font-weight="bold" text-anchor="middle"
        font-family="Nunito, Arial, sans-serif" fill="#bfdbfe" letter-spacing="1">DGS HH</text>
</svg>
