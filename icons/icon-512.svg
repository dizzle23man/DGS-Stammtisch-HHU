<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:0.15"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Ring decoration -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#ring)" stroke-width="4"/>

  <!-- Hand emoji -->
  <text x="256" y="305" font-size="210" text-anchor="middle" font-family="Segoe UI Emoji, Apple Color Emoji, sans-serif">👋</text>

  <!-- Label -->
  <text x="256" y="445" font-size="52" font-weight="bold" text-anchor="middle"
        font-family="Nunito, Arial, sans-serif" fill="#bfdbfe" letter-spacing="3">DGS HH</text>
</svg>
